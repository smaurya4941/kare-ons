<main class="w-full max-w-md">
<!-- Brand / Identity Context (Simplified for transaction) -->
<div class="text-center mb-8">
<a href="{{DATA:SCREEN:SCREEN_22}}" class="inline-block">

<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Create Account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Join the community for elevated learning and authentic Ayurvedic remedies.</p>
</div>
<form action="{{DATA:SCREEN:SCREEN_15}}" class="space-y-6" method="POST">
<!-- Full Name -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2" for="fullName">Full Name</label>
<div class="relative">
<input class="w-full input-clinical font-body-md text-body-md text-on-surface placeholder:text-outline py-2" id="fullName" name="fullName" placeholder="e.g. Charaka Samhita" required="" type="text">
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2" for="email">Email Address</label>
<div class="relative">
<input class="w-full input-clinical font-body-md text-body-md text-on-surface placeholder:text-outline py-2" id="email" name="email" placeholder="your@email.com" required="" type="email">
</div>
</div>
<!-- Password -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2" for="password">Password</label>
<div class="relative">
<input class="w-full input-clinical font-body-md text-body-md text-on-surface placeholder:text-outline py-2" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2" for="confirmPassword">Confirm Password</label>
<div class="relative">
<input class="w-full input-clinical font-body-md text-body-md text-on-surface placeholder:text-outline py-2" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password">
</div>
</div>

<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 px-6 rounded-DEFAULT squish-effect transition-colors duration-300 hover:bg-deep-amethyst flex justify-center items-center gap-2" type="submit">

<span aria-hidden="true" class="material-symbols-outlined text-sm">arrow_forward</span>
