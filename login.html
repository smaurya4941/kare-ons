<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid theme('colors.soft-border');
        }
        .input-clinical {
            border: none;
            border-bottom: 1px solid theme('colors.soft-border');
            border-radius: 0;
            background-color: transparent;
            transition: all 0.3s ease;
        }
        .input-clinical:focus {
            outline: none;
            box-shadow: none;
            border-bottom-color: theme('colors.primary');
            border: 1px solid theme('colors.primary');
            border-radius: theme('borderRadius.DEFAULT');
            padding-left: 12px;
            padding-right: 12px;
            background-color: theme('colors.clinical-white');
        }
        .btn-primary {
            background-color: theme('colors.primary');
            color: theme('colors.clinical-white');
            transition: transform 0.1s ease, box-shadow 0.3s ease;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:hover {
            box-shadow: 0px 8px 24px rgba(161, 0, 255, 0.15);
        }
    </style>

<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Subtle ambient background decoration -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 opacity-30 pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed blur-[120px]"></div>
<div class="absolute bottom-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-surface-container blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[480px] glass-panel rounded-xl shadow-sm p-8 md:p-12 relative z-10 flex flex-col gap-8">
<!-- Header -->
<header class="text-center flex flex-col gap-2">
<a href="{{DATA:SCREEN:SCREEN_22}}" class="inline-block"><h1 class="font-display-lg text-display-lg text-primary">AyuPure</h1></a>
<p class="font-body-lg text-body-lg text-on-surface-variant">Elevated Learning &amp; Pure Ayurveda</p>
</header>
<!-- Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-2 group">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-outline group-focus-within:text-primary transition-colors duration-300 pointer-events-none" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="input-clinical w-full py-3 pl-8 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="email" placeholder="Enter your email" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2 group">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline underline-offset-4" href="{{DATA:SCREEN:SCREEN_12}}">Forgot Password?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-outline group-focus-within:text-primary transition-colors duration-300 pointer-events-none" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="input-clinical w-full py-3 pl-8 pr-10 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" placeholder="Enter your password" required="" type="password">
<button aria-label="Toggle password visibility" class="absolute right-0 text-outline hover:text-primary transition-colors duration-300 flex items-center justify-center p-2" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 mt-4">
<a href="{{DATA:SCREEN:SCREEN_15}}" class="btn-primary w-full py-4 rounded-lg font-label-md text-label-md uppercase tracking-wider flex items-center justify-center gap-2">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</a>
<p class="text-center font-body-md text-body-md text-on-surface-variant mt-4">
                    New to AyuPure? 
                    <a class="font-headline-md text-[16px] font-semibold text-primary hover:underline underline-offset-4 ml-1" href="{{DATA:SCREEN:SCREEN_3}}">Create an Account</a>
</p>
</div>
</form>
</main>
<!-- Suppressed Navigations as per JSON guidelines for transactional pages -->


</body></html>
